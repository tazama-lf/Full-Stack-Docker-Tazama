# For local testing

services:
  # AUTH PROVIDER
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    command: "start-dev --import-realm --health-enabled=true"
    env_file:
      - env/keycloak.env
    restart: always
    environment:
      - KC_HOSTNAME=${KEYCLOAK_HOSTNAME:-localhost}
      - KC_HOSTNAME_STRICT_BACKCHANNEL=false
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_PROXY=edge
      - KEYCLOAK_IMPORT_STRATEGY=IGNORE_EXISTING
      - QUARKUS_HTTP_ACCESS_LOG_ENABLED=true
      - KC_LOG_LEVEL=INFO
    volumes:
      - ./auth/keycloak/realms/00-tazama-test-realm.json:/opt/keycloak/data/import/00-tazama-test-realm.json
    ports:
      - 8080:8080

  # POSTGRES WITH TRUST AUTHENTICATION FOR LOCAL TESTING ONLY
  postgres:
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust

  # AUTH SERVICE
  auth:
    image: tazamaorg/auth-service:${TAZAMA_VERSION}
    env_file:
      - env/auth-service.env
      - .env
    restart: always
    volumes:
      - ./auth/test-private-key.pem:/home/app/test-private-key.pem
      - ./auth/test-public-key.pem:/home/app/test-public-key.pem
    ports:
      - 3020:3020
    depends_on:
      - keycloak

  # TRANSACTION MONITORING SERVICE API
  tms:
    environment:
      - AUTHENTICATED=true
      - CERT_PATH_PUBLIC=test-public-key.pem
    volumes:
      - ./auth/test-public-key.pem:/home/app/test-public-key.pem

  # ADMIN SERVICE API      
  admin-service:
    environment:
      - AUTHENTICATED=true
      - CERT_PATH_PUBLIC=test-public-key.pem
    volumes:
      - ./auth/test-public-key.pem:/home/app/test-public-key.pem

  # BATCH PRE-PROCESSING API
  batch-ppa:
    environment:
      - AUTHENTICATED=true
      - CERT_PATH_PUBLIC=test-public-key.pem
    volumes:
      - ./auth/test-public-key.pem:/home/app/test-public-key.pem

  # TAZAMA DEMO UI
  tazama-demo:
    environment:
      - AUTHENTICATED=true
      - AUTH_SERVICE_URL=http://auth:3020
      # Browser-facing base URL. Defaults to the locally published port; the AWS
      # deploy script overrides DEMO_PUBLIC_URL with https://demo.<domain_zone>
      # (set in core/.env) so OIDC redirects and the Socket.IO client resolve to
      # the public ALB host instead of localhost.
      - AUTH_URL=${DEMO_PUBLIC_URL:-http://localhost:3011}
      - NEXT_PUBLIC_URL=${DEMO_PUBLIC_URL:-http://localhost:3011}
      - NEXT_PUBLIC_WS_URL=${DEMO_PUBLIC_URL:-http://localhost:3011}
      # Defaults to the committed test secret for local dev; the AWS deploy
      # script overrides DEMO_NEXTAUTH_SECRET from SSM (/tazama/nextauth_secret).
      - NEXTAUTH_SECRET=${DEMO_NEXTAUTH_SECRET:-Q1+Ojp/rNjpHVVQDVFxBYdhp4ELCZi/cCzGz2xXsD38=}
      - CERT_PATH_PUBLIC=test-public-key.pem
    volumes:
      - ./auth/test-public-key.pem:/app/test-public-key.pem

