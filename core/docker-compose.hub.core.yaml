services:
  # ADMIN SERVICE API
  admin-service:
    image: tazamaorg/admin-service:${TAZAMA_VERSION}
    env_file:
      - env/admin.env
      - .env
    restart: always
    ports:
      - ${ADMIN_PORT}:3100
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    environment:
      - CORS_POLICY=demo

  # TRANSACTION MONITORING SERVICE API
  tms:
    image: tazamaorg/tms-service:${TAZAMA_VERSION}
    env_file:
      - env/tms.env
      - .env
    restart: always
    ports:
      - ${TMS_PORT}:3000
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      - CORS_POLICY=demo

  # BATCH PRE-PROCESSING API
  batch-ppa:
    image: tazamaorg/batch-ppa:${TAZAMA_VERSION}
    env_file:
      - env/batch-ppa.env
      - .env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      tms:
        condition: service_started
    ports:
      - 4100:4100

  # EVENT DIRECTOR
  ed:
    image: tazamaorg/event-director:${TAZAMA_VERSION}
    env_file:
      - env/ed.env
      - .env
    restart: always
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  # TYPOLOGY PROCESSOR
  tp:
    image: tazamaorg/typology-processor:${TAZAMA_VERSION}
    env_file:
      - env/tp.env
      - .env
    restart: always
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  # EVENT ADJUDICATOR
  event-adjudicator:
    image: tazamaorg/event-adjudicator:${TAZAMA_VERSION}
    env_file:
      - env/event-adjudicator.env
      - .env
    restart: always
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
  
  # EVENT FLOW RULE PROCESSOR
  ef:
    image: tazamaorg/event-flow:${TAZAMA_VERSION}
    env_file:
      - env/event-flow.env
      - .env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      nats:
        condition: service_started

  # TAZAMA DEMO UI
  tazama-demo:
    image: tazamaorg/tazama-demo:${TAZAMA_VERSION}
    restart: always
    env_file:
      - env/ui.env
    depends_on:
      tms:
        condition: service_started
      admin-service:
        condition: service_started
      nats:
        condition: service_started
    ports:
      - "${DEMO_PORT:-3011}:3011"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3011/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
