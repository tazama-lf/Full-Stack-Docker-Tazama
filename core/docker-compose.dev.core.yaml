# base

include:
  - path:
    - docker-compose.base.infrastructure.yaml

services:
  # ADMIN SERVICE API
  admin-service:
    image: !reset null
    build:
      context: https://github.com/tazama-lf/admin-service.git#${ADMIN_BRANCH}
      args:
        - GH_TOKEN
      secrets:
        - GH_TOKEN
    env_file:
      - env/admin.env
      - .env
    restart: always
    ports:
      - ${ADMIN_PORT}:3100
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  # TRANSACTION MONITORING SERVICE API
  tms:
    image: !reset null
    build:
      context: https://github.com/tazama-lf/tms-service.git#${TMS_BRANCH}
      args:
        - GH_TOKEN
      secrets:
        - GH_TOKEN
    env_file:
      - env/tms.env
      - .env
    restart: always
    ports:
      - ${TMS_PORT}:3000
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  # EVENT DIRECTOR
  ed:
    image: !reset null
    build:
      context: https://github.com/tazama-lf/event-director.git#${ED_BRANCH}
      args:
        - GH_TOKEN
      secrets:
        - GH_TOKEN
    env_file:
      - env/ed.env
      - .env
    restart: always
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  # RULE PROCESSOR
  rule-901:
    image: !reset null
    build:
      context: https://github.com/tazama-lf/rule-executer.git#${RULE_901_BRANCH}
      args:
        - GH_TOKEN
      secrets:
        - GH_TOKEN
    env_file:
      - env/rule-901.env
      - .env
    restart: always
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  # TYPOLOGY PROCESSOR
  tp:
    image: !reset null
    build:
      context: https://github.com/tazama-lf/typology-processor.git#${TP_BRANCH}
      args:
        - GH_TOKEN
      secrets:
        - GH_TOKEN
    env_file:
      - env/tp.env
      - .env
    restart: always
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  # EVENT ADJUDICATOR
  event-adjudicator:
    image: !reset null
    build:
      context: https://github.com/tazama-lf/event-adjudicator.git#${EA_BRANCH}
      args:
        - GH_TOKEN
      secrets:
        - GH_TOKEN
    env_file:
      - env/event-adjudicator.env
      - .env
    restart: always
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
  
  # EVENT FLOW RULE PROCESSOR
  ef:
    image: !reset null
    build:
      context: https://github.com/tazama-lf/event-flow.git#${EVENT_FLOW_BRANCH}
      args:
        - GH_TOKEN
      secrets:
        - GH_TOKEN
    env_file:
      - env/event-flow.env
      - .env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      nats:
        condition: service_started

  # TAZAMA DEMO UI
  tazama-demo:
    image: !reset null
    build:
      context: https://github.com/tazama-lf/tazama-demo.git#${TAZAMA_DEMO_BRANCH}
      args:
        - GH_TOKEN
      secrets:
        - GH_TOKEN
    restart: always
    env_file:
      - env/ui.env
    depends_on:
      tms:
        condition: service_started
      admin-service:
        condition: service_started
      nats:
        condition: service_started
    ports:
      - "3011:3011"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3011/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

secrets:
  GH_TOKEN:
    environment: GH_TOKEN
