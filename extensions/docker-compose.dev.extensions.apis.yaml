services:
  dems:
    image: !reset null
    container_name: tazama-dems-1
    build:
      context: https://github.com/tazama-lf/event-monitoring-service.git#${DEMS_BRANCH}
      args:
        - GH_TOKEN
    env_file:
      - env/dems.env  
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    ports:
      - ${DEMS_PORT}:3002

  deapi:
    image: !reset null
    container_name: tazama-deapi-1
    build:
      context: https://github.com/tazama-lf/data-enrichment-service.git#${DEAPI_BRANCH}
      args:
        - GH_TOKEN
    env_file:
      - env/deapi.env 
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    ports:
      - ${DEAPI_PORT}:3001


