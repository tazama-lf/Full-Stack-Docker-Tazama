services:
  extensions-pgadmin:
    image: dpage/pgadmin4:9.15.0
    container_name: extensions-pgadmin
    env_file:
      - env/extensions-pgadmin.env
    ports:
      - ${PGADMIN_PORT:-5051}:80
    configs:
      - source: servers.json
        target: /pgadmin4/servers.json
    restart: always
    depends_on:
      - extensions-postgres

configs:
  servers.json:
    content: |
      {
        "Servers": {
          "1": {
              "Name": "Tazama",
              "Group": "Servers",
              "Port": 5432,
              "Username": "postgres",
              "Host": "extensions-postgres",
              "MaintenanceDB": "postgres",
              "ConnectionParameters": {
                  "sslmode": "prefer",
                  "connect_timeout": 10
              }
          }
        }
      }