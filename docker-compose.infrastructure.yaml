# base infrastructure

services:
  valkey:
    hostname: valkey
    image: valkey/valkey:7.2.5
    restart: always
    command: "valkey-server --port 6379"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -p 6379 ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    env_file:
      - .env 
    restart: always
    volumes:
      - ./postgres/migration/base/00-CREATE.sql:/docker-entrypoint-initdb.d/00-CREATE.sql

  nats:
    image: nats:2
    restart: always
