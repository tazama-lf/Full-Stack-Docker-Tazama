# base

include:
  - path:
    - docker-compose.infrastructure.yaml

services:
  # TRANSACTION MONITORING SERVICE
  tms:
    image: tazamaorg/tms-service:${TAZAMA_VERSION}
    env_file:
      - env/tms.env
      - .env
    restart: always
    ports:
      - ${TMS_PORT}:3000
    depends_on:
      - valkey
      - postgres
      - nats

  # EVENT DIRECTOR
  ed:
    image: tazamaorg/event-director:${TAZAMA_VERSION}
    env_file:
      - env/ed.env
      - .env
    restart: always
    depends_on:
      - valkey
      - postgres
      - nats

  # TYPOLOGY PROCESSOR
  tp:
    image: tazamaorg/typology-processor:${TAZAMA_VERSION}
    env_file:
      - env/tp.env
      - .env
    restart: always
    depends_on:
      - valkey
      - postgres
      - nats

  # TRANSACTION AGGREGATION AND DECISIONING PROCESSOR
  tadp:
    image: tazamaorg/transaction-aggregation-decisioning-processor:${TAZAMA_VERSION}
    env_file:
      - env/tadp.env
      - .env
    restart: always
    depends_on:
      - valkey
      - postgres
      - nats
  
  admin-service:
    image: tazamaorg/admin-service:${TAZAMA_VERSION}
    env_file:
      - env/admin.env
      - .env
    restart: always
    ports:
      - ${ADMIN_PORT}:3100
    depends_on:
      - postgres
      - valkey

