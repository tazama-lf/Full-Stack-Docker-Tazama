services:
  aws-cli:
    image: amazon/aws-cli
    container_name: ozone-aws-cli
    restart: unless-stopped
    env_file:
      - .env
      - env/aws-cli.env
    depends_on:
      - s3g
    entrypoint: >
      /bin/sh -c "
      sleep 15;
      aws configure set aws_access_key_id $$AWS_ACCESS_KEY_ID &&
      aws configure set aws_secret_access_key $$AWS_SECRET_ACCESS_KEY &&
      aws configure set default.region $$AWS_DEFAULT_REGION &&
      aws --endpoint-url $$AWS_ENDPOINT_URL s3 mb s3://$$AWS_BUCKET_NAME || true;
      tail -f /dev/null
      "

  nifi-init:
    image: curlimages/curl:latest
    container_name: nifi-init
    restart: on-failure
    env_file:
      - .env
      - env/nifi-init.env
    depends_on:
      - nifi
    volumes:
      - ./nifi:/nifi:ro
    entrypoint: ["/bin/sh", "/nifi/init.sh"]
