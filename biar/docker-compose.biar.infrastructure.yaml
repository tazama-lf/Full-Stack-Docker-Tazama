x-common-config: &ozone-common-config
  image: apache/ozone:2.0.0
  env_file:
    - docker-config
  networks:
    - tazama_default

x-replication: &ozone-replication
  OZONE-SITE.XML_ozone.server.default.replication: ${OZONE_REPLICATION_FACTOR:-1}

services:

  tika:
    image: logicalspark/docker-tikaserver:latest
    container_name: biar-tika
    restart: unless-stopped
    ports:
      - "9998:9998"
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - tazama_default

  solr:
    image: solr:9
    container_name: biar-solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    environment:
      SOLR_HEAP: 512m
    volumes:
      - solr_data:/var/solr
    command:
      - sh
      - -c
      - "solr-precreate biar_docs /opt/solr/server/solr/configsets/sample_techproducts_configs"
    networks:
      - tazama_default

  nifi:
    build:
      context: .
      dockerfile: DOCKERFILE
    image: custom-nifi:1.24.0
    container_name: biar-nifi
    hostname: nifi
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      NIFI_WEB_HTTP_PORT: 8088
      NIFI_WEB_HTTP_HOST: 0.0.0.0
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: admin123456789
      NIFI_JVM_HEAP_INIT: 512m
      NIFI_JVM_HEAP_MAX: 1g
      PB_BUCKET: tazama
      PB_SENSITIVE: "false"
      PB_CONTEXT_NAME: "Parameters"
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_db:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository
    networks:
      - tazama_default

  scm:
    <<: *ozone-common-config
    container_name: ozone-scm-1
    ports:
      - "9876:9876"
      - "9860:9860"
    environment:
      ENSURE_SCM_INITIALIZED: /data/metadata/scm/current/VERSION
      OZONE-SITE.XML_hdds.scm.safemode.min.datanode: ${OZONE_SAFEMODE_MIN_DATANODES:-1}
      <<: *ozone-replication
    command: ["ozone", "scm"]
    volumes:
      - scm_data:/data

  om:
    <<: *ozone-common-config
    container_name: ozone-om-1
    ports:
      - "9874:9874"
      - "9862:9862"
    environment:
      ENSURE_OM_INITIALIZED: /data/metadata/om/current/VERSION
      <<: *ozone-replication
    command: ["ozone", "om"]
    volumes:
      - om_data:/data

  datanode1:
    <<: *ozone-common-config
    container_name: ozone-datanode-1
    hostname: ozone-datanode-1
    environment:
      <<: *ozone-replication
      OZONE-SITE.XML_hdds.datanode.hostname: ozone-datanode-1
      OZONE-SITE.XML_hdds.datanode.bind.host: 0.0.0.0
      OZONE-SITE.XML_hdds.datanode.address: ozone-datanode-1:9864
      OZONE-SITE.XML_hdds.container.ipc.address: ozone-datanode-1:9859
      OZONE-SITE.XML_hdds.container.ratis.ipc.address: ozone-datanode-1:9858
    command: ["ozone", "datanode"]
    volumes:
      - datanode1_data:/data

  datanode2:
    <<: *ozone-common-config
    container_name: ozone-datanode-2
    hostname: ozone-datanode-2
    environment:
      <<: *ozone-replication
      OZONE-SITE.XML_hdds.datanode.hostname: ozone-datanode-2
      OZONE-SITE.XML_hdds.datanode.bind.host: 0.0.0.0
      OZONE-SITE.XML_hdds.datanode.address: ozone-datanode-2:9864
      OZONE-SITE.XML_hdds.container.ipc.address: ozone-datanode-2:9859
      OZONE-SITE.XML_hdds.container.ratis.ipc.address: ozone-datanode-2:9858
    command: ["ozone", "datanode"]
    volumes:
      - datanode2_data:/data

  datanode3:
    <<: *ozone-common-config
    container_name: ozone-datanode-3
    hostname: ozone-datanode-3
    environment:
      <<: *ozone-replication
      OZONE-SITE.XML_hdds.datanode.hostname: ozone-datanode-3
      OZONE-SITE.XML_hdds.datanode.bind.host: 0.0.0.0
      OZONE-SITE.XML_hdds.datanode.address: ozone-datanode-3:9864
      OZONE-SITE.XML_hdds.container.ipc.address: ozone-datanode-3:9859
      OZONE-SITE.XML_hdds.container.ratis.ipc.address: ozone-datanode-3:9858
    command: ["ozone", "datanode"]
    volumes:
      - datanode3_data:/data

  recon:
    <<: *ozone-common-config
    container_name: ozone-recon-1
    hostname: recon
    ports:
      - "9888:9888"
    environment:
      <<: *ozone-replication
    command: ["ozone", "recon"]
    volumes:
      - recon_data:/data
    depends_on:
      - scm
      - om

  s3g:
    <<: *ozone-common-config
    container_name: ozone-s3g-1
    ports:
      - "9878:9878"
      - "19878:19878"
    environment:
      <<: *ozone-replication
    command: ["ozone", "s3g"]
    depends_on:
      - scm
      - om

  aws-cli:
    image: amazon/aws-cli
    container_name: ozone-aws-cli
    depends_on:
      - s3g
    entrypoint: >
      /bin/sh -c "
      sleep 15;
      aws configure set aws_access_key_id tazama &&
      aws configure set aws_secret_access_key tazama &&
      aws configure set default.region us-east-1 &&
      aws --endpoint-url http://s3g:9878 s3 mb s3://tazama-bucket || true;
      tail -f /dev/null
      "
    networks:
      - tazama_default

  nifi-init:
    image: curlimages/curl:latest
    container_name: nifi-init
    depends_on:
      - nifi
    volumes:
      - ./nifi-init.sh:/nifi-init.sh
    entrypoint: ["/bin/sh", "/nifi-init.sh"]
    environment:
      PB_CONTEXT_NAME: Parameters
      PB_NAME: pbucket
      PB_BUCKET: tazama
      PB_SENSITIVE_FALSE: false
    networks:
      - tazama_default

volumes:
  solr_data:
  nifi_conf:
  nifi_state:
  nifi_db:
  nifi_flowfile:
  nifi_content:
  nifi_provenance:
  scm_data:
  om_data:
  datanode1_data:
  datanode2_data:
  datanode3_data:
  recon_data:

networks:
  tazama_default: